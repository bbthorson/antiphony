<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Antiphony">
  <!-- Call-and-response motif: a solid voice (the call) answered by an echo
       ring (the response). Minimal so it stays legible at favicon sizes. -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  <circle cx="11.5" cy="16" r="4" fill="#ffffff"/>
  <circle cx="21" cy="16" r="4.25" fill="none" stroke="#ffffff" stroke-width="2.25"/>
</svg>
