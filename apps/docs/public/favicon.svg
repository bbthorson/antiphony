<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Antiphony">
  <!-- "Two Voices" motif: an indigo call answered by a coral response. The
       brand duotone, minimal so it stays legible at favicon sizes. -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  <circle cx="10" cy="16" r="3.75" fill="#ffffff"/>
  <!-- white halo under the coral ring so the response separates from the
       indigo field (coral-on-indigo is ~2.3:1 — invisible at 16px otherwise). -->
  <circle cx="22" cy="16" r="4" fill="none" stroke="#ffffff" stroke-width="4.5"/>
  <circle cx="22" cy="16" r="4" fill="none" stroke="#f97362" stroke-width="2.5"/>
</svg>
