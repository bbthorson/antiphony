<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Antiphony">
  <!-- "Two Voices" motif: an indigo call answered by a coral response. The
       brand duotone, minimal so it stays legible at favicon sizes. -->
