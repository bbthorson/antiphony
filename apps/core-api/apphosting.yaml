# Firebase App Hosting config for the core-api backend (Phase 4a).
#
# ── SINGLE SOURCE OF TRUTH for core-api's deployed config ──────────────────────
# core-api deploys from the PUBLIC MIRROR (`bbthorson/vox-pop-core`), whose
# `vox-pop-core-api` App Hosting backend is rooted at `/` and therefore reads the
# mirror's ROOT `apphosting.yaml`. That root file is NOT part of any synced
# subtree, so the sync workflow regenerates it from THIS file on every sync
# (`cp apps/core-api/apphosting.yaml apphosting.yaml` in
# `.github/workflows/sync-public-core.yml`). Net effect: edit THIS file on the
# private master and it propagates to what production actually runs. (Before
# #654 the mirror root was hand-maintained and silently diverged — see
# docs/tech-debt.md Architecture Drift #5.)
#
# The `rootDirectory: apps/core-api` below is what makes a verbatim copy a
# complete, deployable ROOT config: it points the framework adapter at the app
# subdir while `npm ci` still runs from the workspace root. In the PRIVATE repo
# this file is inert (no private backend reads it; core-api only deploys from the
# mirror), so the field is harmless here and load-bearing once copied.
#
# App Hosting discovers a framework adapter automatically; the Hono +
# @hono/node-server template here matches the adapter's expectations
# (Node >= 22, `build` + `start` npm scripts, `PORT` env var).
#
# See https://firebase.blog/posts/2025/06/app-hosting-frameworks/,
# specs/decoupling-migration.md § Phase 4, and docs/4b-carveout-runbook.md.

rootDirectory: apps/core-api

runConfig:
    # min=0 is fine for a solo-user deployment; revisit if we get real traffic.
    minInstances: 0
    # Cloud Run requires startupProbe.timeoutSeconds <= periodSeconds. Total
    # startup window = failureThreshold × periodSeconds = 300s (5 min), which
    # is plenty for Node + Hono + Firebase Admin cold starts.
    startupProbe:
        timeoutSeconds: 10
        periodSeconds: 30
        failureThreshold: 10
    livenessProbe:
        failureThreshold: 10

# Environment + secrets.
#
# Sharing credentials with apps/web for now per specs/decoupling-migration.md
# § Post-4a Follow-ups ("Split service accounts"). When that follow-up lands,
# core-api gets its own secrets with narrower IAM scopes.
#
# Naming convention: no `NEXT_PUBLIC_*` prefix here — that's a Next.js thing;
# core-api is a plain Node service. Variables pull from the same Secret
# Manager entries apps/web uses.
env:
    - variable: FIREBASE_PROJECT_ID
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      availability:
          - BUILD
          - RUNTIME
    - variable: FIREBASE_STORAGE_BUCKET
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      availability:
          - BUILD
          - RUNTIME
    - variable: ADMIN_SERVICE_ACCOUNT_JSON
      secret: ADMIN_SERVICE_ACCOUNT_JSON
      availability:
          - BUILD
          - RUNTIME
    - variable: GCLOUD_PROJECT
      value: "vox-pop-simple"
      availability:
          - RUNTIME
    - variable: NODE_ENV
      value: "production"
      availability:
          - RUNTIME
    - variable: LOG_LEVEL
      value: "info"
      availability:
          - RUNTIME
    # CORS allowlist for browser-direct calls. Comma-separated full origins
    # (with scheme). The Vox Pop production origins are listed here; self-
    # hosters fork or override this file with their own deployment's origins.
    # See apps/core-api/src/app.ts:parseAllowedOrigins +
    # specs/client-caller-split.md.
    #
    # NOTE: localhost origins are intentionally absent here. Production
    # should never accept credentialed requests from localhost. Local dev
    # does NOT read this file — it relies on the code-level fallback in
    # parseAllowedOrigins() (returns ['http://localhost:9002',
    # 'http://localhost:3002'] when ALLOWED_ORIGINS env var is unset), so
    # removing localhost here does NOT break `npm run dev`. (Security audit
    # Info finding.)
    #
    # Both the inbox (apps/web @ inbox.voxpop…) and the public capture surface
    # (apps/public @ prompts.voxpop…) do browser-direct audio upload
    # (POST /api/v1/audio/upload), so BOTH custom domains must be allowlisted
    # here — plus each backend's *.hosted.app default for testing. See
    # specs/apps-public-split.md § CORS/origins.
    #
    # IMPORTANT: this value is overridden if a backend-level (Firebase console)
    # ALLOWED_ORIGINS is set on vox-pop-core-api — console values win over
    # apphosting.yaml (variable hierarchy). Keep the console override deleted so
    # this version-controlled list is the single source of truth.
    - variable: ALLOWED_ORIGINS
      value: "https://voxpop.phonicfactory.com,https://inbox.voxpop.phonicfactory.com,https://prompts.voxpop.phonicfactory.com,https://embed.voxpop.phonicfactory.com,https://vox-pop-embed.web.app,https://vox-pop-embed.firebaseapp.com,https://vox-pop--vox-pop-simple.us-east4.hosted.app,https://vox-pop-prompts--vox-pop-simple.us-east4.hosted.app,https://vox-pop-core-api--vox-pop-simple.us-east4.hosted.app"
      availability:
          - RUNTIME
    # Shared secret used by apps/telephony to authenticate
    # system-to-system requests against core-api (e.g.
    # `/api/v1/call-forwarding/by-*`, `POST /api/v1/system/replies`).
    # See apps/core-api/src/middleware/system-auth.ts. Same secret on
    # both sides — pre-deploy ops step adds it to Secret Manager.
    - variable: SYSTEM_AUTH_TOKEN
      secret: SYSTEM_AUTH_TOKEN
      availability:
          - RUNTIME
