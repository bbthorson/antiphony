# Firebase App Hosting config for the core-api backend (Phase 4a).
#
# App Hosting discovers a framework adapter automatically; the Hono +
# @hono/node-server template here matches the adapter's expectations
# (Node >= 22, `build` + `start` npm scripts, `PORT` env var).
#
# See https://firebase.blog/posts/2025/06/app-hosting-frameworks/
# and specs/decoupling-migration.md § Phase 4.

runConfig:
    # min=0 is fine for a solo-user deployment; revisit if we get real traffic.
    minInstances: 0
    # Cloud Run requires startupProbe.timeoutSeconds <= periodSeconds. Total
    # startup window = failureThreshold × periodSeconds = 300s (5 min), which
    # is plenty for Node + Hono + Firebase Admin cold starts.
    startupProbe:
        timeoutSeconds: 10
        periodSeconds: 30
        failureThreshold: 10
    livenessProbe:
        failureThreshold: 10

# Environment + secrets.
#
# Sharing credentials with apps/web for now per specs/decoupling-migration.md
# § Post-4a Follow-ups ("Split service accounts"). When that follow-up lands,
# core-api gets its own secrets with narrower IAM scopes.
#
# Naming convention: no `NEXT_PUBLIC_*` prefix here — that's a Next.js thing;
# core-api is a plain Node service. Variables pull from the same Secret
# Manager entries apps/web uses.
env:
    - variable: FIREBASE_PROJECT_ID
      secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      availability:
          - BUILD
          - RUNTIME
    - variable: FIREBASE_STORAGE_BUCKET
      secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      availability:
          - BUILD
          - RUNTIME
    - variable: ADMIN_SERVICE_ACCOUNT_JSON
      secret: ADMIN_SERVICE_ACCOUNT_JSON
      availability:
          - BUILD
          - RUNTIME
    - variable: GCLOUD_PROJECT
      value: "vox-pop-simple"
      availability:
          - RUNTIME
    - variable: NODE_ENV
      value: "production"
      availability:
          - RUNTIME
    - variable: LOG_LEVEL
      value: "info"
      availability:
          - RUNTIME
    # CORS allowlist for browser-direct calls. Comma-separated full origins
    # (with scheme). The Vox Pop production origins are listed here; self-
    # hosters fork or override this file with their own deployment's origins.
    # See apps/core-api/src/app.ts:parseAllowedOrigins +
    # specs/client-caller-split.md.
    - variable: ALLOWED_ORIGINS
      value: "https://voxpop.phonicfactory.com,https://embed.phonicfactory.com,https://vox-pop-embed.web.app,https://vox-pop-embed.firebaseapp.com,https://vox-pop--vox-pop-simple.us-east4.hosted.app,https://vox-pop-core-api--vox-pop-simple.us-east4.hosted.app,http://localhost:9002,http://localhost:5173"
      availability:
          - RUNTIME
    # Shared secret used by apps/telephony to authenticate
    # system-to-system requests against core-api (e.g.
    # `/api/v1/call-forwarding/by-*`, `POST /api/v1/system/replies`).
    # See apps/core-api/src/middleware/system-auth.ts. Same secret on
    # both sides — pre-deploy ops step adds it to Secret Manager.
    - variable: SYSTEM_AUTH_TOKEN
      secret: SYSTEM_AUTH_TOKEN
      availability:
          - RUNTIME
