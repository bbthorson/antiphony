# Firebase App Hosting config for the Antiphony core-api backend.
#
# ── Authoritative deploy config for the `antiphony-core` project ───────────────
# The App Hosting backend is rooted at the REPO ROOT (`/`). The generic Node
# buildpack runs the ROOT package.json scripts from /workspace:
#   - `npm ci`        installs the whole workspace (core-api depends on
#                     @antiphony/core + @antiphony/shared via npm workspaces).
#   - `npm run build` builds @antiphony/shared (dual) then bundles core-api to
#                     apps/core-api/dist/index.js (esbuild) + gen:openapi.
#   - `npm start`     → `node apps/core-api/dist/index.js`, listening on $PORT.
# (We deploy from repo root rather than a `rootDirectory` subdir because the
# buildpack's start phase ignores rootDirectory and defaults to `node index.js`
# at /workspace — so the root package.json must carry the `start` script.)
#
# Unlike the Vox Pop monorepo, there is no public-mirror sync here — this repo
# IS the authoritative source, so this root file is the single source of truth
# for what production runs.
#
# Credentials: Application Default Credentials (the App Hosting compute service
# account) — NO `ADMIN_SERVICE_ACCOUNT_JSON` secret needed. firebase-admin falls
# back to ADC when that env var is unset (see src/lib/firebase-admin.ts). Grant
# the App Hosting SA these roles on the project:
#   - roles/datastore.user                  (Firestore read/write)
#   - roles/storage.objectAdmin             (audio blob upload/read)
#   - roles/iam.serviceAccountTokenCreator  (on ITSELF — required for V4 signed
#                                            audio URLs via ADC, i.e. signBlob)
# Token VERIFICATION (requireAuth) needs no special grant — it validates Firebase
# ID tokens against Google's public certs.

runConfig:
    # min=0 is fine for a low-traffic reference deploy; raise if cold starts bite.
    minInstances: 0
    startupProbe:
        timeoutSeconds: 10
        periodSeconds: 30
        failureThreshold: 10
    livenessProbe:
        failureThreshold: 10

env:
    # Project id — firebase-admin reads GCLOUD_PROJECT (or FIREBASE_PROJECT_ID).
    - variable: GCLOUD_PROJECT
      value: "antiphony-core"
      availability:
          - BUILD
          - RUNTIME
    # Default Storage bucket. New Firebase projects provision a
    # `<project>.firebasestorage.app` bucket — VERIFY the exact name after you
    # enable Storage and update this if it differs.
    - variable: FIREBASE_STORAGE_BUCKET
      value: "antiphony-core.firebasestorage.app"
      availability:
          - BUILD
          - RUNTIME
    - variable: NODE_ENV
      value: "production"
      availability:
          - RUNTIME
    - variable: LOG_LEVEL
      value: "info"
      availability:
          - RUNTIME
    # App-DID custody host (specs/atproto-authority-model.md). Turns ON the boot
    # gate's host-match check: validateAllPins resolves each tenant's did:web at
    # startup and REFUSES TO START unless its #atproto_pds endpoint points here
    # (fail-closed). NOT secret. Also couples boot to each pinned domain being
    # reachable — a did:web outage during a restart blocks boot (by design).
    - variable: ANTIPHONY_PDS_HOST
      value: "api.antiphony.dev"
      availability:
          - RUNTIME
    # Per-tenant app-DID pins: comma-separated `originAppId:did`. NOT secret —
    # these are public DIDs. Must stay in sync with ANTIPHONY_APP_TOKENS (a
    # tenant needs an entry in BOTH; boot warns on drift). Add bardcast here once
    # its domain/did.json is live.
    # `voxpop` moved off did:web:voxpop.audio (2026-07-12): the apex is now the
    # handle of the Vox Pop *account* (did:plc:zp6xkzxo5uzgstgiy77iiz5j), so the
    # app DID lives on its own subdomain rather than having one domain name two
    # identities. Changing this value rewrites the authority of every post URI —
    # stored StrongRefs must be migrated in lockstep (parsePostId rejects any
    # authority that isn't the pinned app DID).
    - variable: ANTIPHONY_APP_DIDS
      value: "voxpop:did:web:did.voxpop.audio"
      availability:
          - RUNTIME
    # Service-to-service app credentials (specs/service-auth.md): comma-
    # separated `appId:token` pairs, tokens ≥32 chars. SECRET — wire through
    # Secret Manager, never a plaintext value here. Set the value (e.g.
    # `voxpop:<64-hex-token>`) BEFORE this deploys, or boot fails on the missing
    # secret ref:
    #   firebase apphosting:secrets:set antiphony-app-tokens
    - variable: ANTIPHONY_APP_TOKENS
      secret: antiphony-app-tokens
      availability:
          - RUNTIME
    # CORS allowlist for browser-direct calls (the reference app's audio upload).
    # Comma-separated full origins. Starts with the App Hosting default domain
    # for the `antiphony-core-api` backend; ADD the custom domain (e.g.
    # https://api.antiphony.dev / the reference app's origin) once DNS is wired.
    # NOTE: a backend-level ALLOWED_ORIGINS set in the console OVERRIDES this —
    # keep the console value unset so this file stays the source of truth.
    - variable: ALLOWED_ORIGINS
      value: "https://api.antiphony.dev,https://antiphony--antiphony-core.us-east4.hosted.app"
      availability:
          - RUNTIME

    # ── Audio enrichment (specs/enrichment-pipeline-plan.md, step 8) ───────────
    # Without this block the dispatch seam resolves the NOOP dispatcher and both
    # ElevenLabs stages settle `skipped` — every processing request sits `pending`
    # forever. The three ANTIPHONY_TASKS_* vars are what `cloudTasksRequested()`
    # keys on; set together or not at all (a partial set logs at `error` and still
    # drops jobs). Project id is not repeated here — the adapter falls back to
    # GCLOUD_PROJECT, set above.
    #
    # Durable dispatch target: the Cloud Tasks queue created in us-east4. The
    # runtime SA (firebase-app-hosting-compute@) holds roles/cloudtasks.enqueuer.
    - variable: ANTIPHONY_TASKS_LOCATION
      value: "us-east4"
      availability:
          - RUNTIME
    - variable: ANTIPHONY_TASKS_QUEUE
      value: "antiphony-processing"
      availability:
          - RUNTIME
    # Absolute URL Cloud Tasks calls back with each job. Must resolve to THIS
    # backend and carry to the system-auth'd worker route. The default App
    # Hosting domain (same host as the CORS origin above) is stable and always
    # exists; switch to https://api.antiphony.dev once that custom domain is the
    # canonical ingress.
    - variable: ANTIPHONY_TASKS_WORKER_URL
      value: "https://antiphony--antiphony-core.us-east4.hosted.app/api/v1/system/process-audio"
      availability:
          - RUNTIME
    # Shared bearer the worker route authenticates callbacks with, and that the
    # enqueuing adapter bakes into each task's headers. Required by EVERY
    # `/system/*` route, not just this one — absent until now, so setting it also
    # switches on the other system routes. SECRET, ≥32 chars (middleware rejects
    # shorter). Version 2 of `system-auth-token` holds the value; the compute SA
    # has roles/secretmanager.secretAccessor.
    - variable: SYSTEM_AUTH_TOKEN
      secret: system-auth-token
      availability:
          - RUNTIME
    # ElevenLabs API key. Its PRESENCE alone selects the real Scribe/Voice
    # Isolator providers (no separate enable flag); absent ⇒ denoise/transcribe
    # settle `skipped`. SECRET — set via `firebase apphosting:secrets:set
    # elevenlabs-api-key` BEFORE this deploys, or boot fails on the missing ref.
    - variable: ELEVENLABS_API_KEY
      secret: elevenlabs-api-key
      availability:
          - RUNTIME
